spring:
  application:
    name: library-events-producer-v2
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/library_events}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
#    properties:
#      hibernate:
#        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 1
      properties:
        linger.ms: 10
        batch.size: 32768
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000
        max.block.ms: 5000
        retry.backoff.ms: 1000

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.learnjava.library_events_producer_v2: DEBUG
    org.springframework.web: INFO
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

kafka:
  topic:
    name: ${KAFKA_TOPIC_NAME:library-events}
    partitions: 3
    replication-factor: 1
  producer:
    publish-timeout-seconds: ${KAFKA_PRODUCER_PUBLISH_TIMEOUT_SECONDS:5}
